name: Deploy to dev/staging

on:
  push:
    branches:
      - "main"

jobs:
  redeploy_everything:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem

          ssh -o StrictHostKeyChecking=no -i private_key.pem ubuntu@43.205.129.39 << 'EOF'
            cd ~/ci-cd-turborepo

            git pull origin main

            pnpm install

            cd packages/prisma
            npx prisma generate
            npx prisma migrate deploy
            cd ../..

            pnpm run build

            pm2 restart all
          EOF